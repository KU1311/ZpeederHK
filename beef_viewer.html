<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZpeederHK - 精確邊界分區版</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; }
        
        #status-indicator {
            position: absolute; top: 20px; left: 20px; z-index: 2000;
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 15px;
            border-radius: 8px; font-family: monospace; font-size: 14px;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333; line-height: 1.6;
        }

        .control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3); width: 260px;
        }

        select, input[type="range"] { width: 100%; margin: 8px 0; cursor: pointer; }
        .range-display { text-align: center; font-weight: bold; color: #e74c3c; margin-bottom: 10px; font-size: 18px; }

        button#update-btn {
            width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; 
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        button#update-btn:hover { background: #1a252f; }
        
        .popup-box { min-width: 180px; }
        .history-box { 
            background: #f8f9fa; border-left: 4px solid #2c3e50; 
            padding: 8px; font-size: 11px; margin-top: 8px; line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="status-indicator">⏳ 正在初始化系統...</div>

<div class="control-panel">
    <h3 style="margin:0 0 12px 0; text-align: center;">🚗 違停風險查詢</h3>
    
    <label style="font-size:12px; color:#666;">選擇日子：</label>
    <select id="dayType">
        <option value="Weekday">平日 (Weekday)</option>
        <option value="Sat">週六 (Sat)</option>
        <option value="Sun">週日 (Sun)</option>
    </select>

    <label style="font-size:12px; color:#666;">觀測時間：</label>
    <input type="range" id="singleHour" min="0" max="23" value="15" oninput="hV1.innerText=this.value.padStart(2,'0')">
    <div class="range-display"><span id="hV1">15</span>:00</div>

    <button id="update-btn" onclick="executeLoad()">手動更新數據</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@mapbox/leaflet-pip@1.1.0/leaflet-pip.js"></script>
<script src="https://unpkg.com/@ngageoint/leaflet-geopackage@2.0.5/dist/leaflet-geopackage.min.js"></script>

<script>
    const map = L.map('map', { zoomSnap: 0.1 }).setView([22.3193, 114.1700], 18);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

    let activeLayers = [];
    let userMarker = null;
    let districtBoundaryLayer = null;

    // 18區完整清單 (用於備份與背景下載)
    const allDistrictIDs = [
        "Southern_District", "Wan_Chai_District", "Central_and_Western_District", 
        "Eastern_District", "Islands_District", "Yau_Tsim_Mong_District", 
        "Kwun_Tong_District", "Sham_Shui_Po_District", "Kowloon_City_District", 
        "Wong_Tai_Sin_District", "Kwai_Tsing_District", "Tsuen_Wan_District", 
        "Tuen_Mun_District", "Sha_Tin_District", "Sai_Kung_District", 
        "Yuen_Long_District", "Tai_Po_District", "North_District"
    ];

    function getColor(d) {
        return d >= 80 ? '#800026' : d >= 60 ? '#BD0026' : d >= 40 ? '#E31A1C' : 
               d >= 20 ? '#FC4E2A' : d > 0 ? '#FEB24C' : '#FFEDA0';
    }

    // --- 初始化系統 ---
    async function initSystem() {
        const status = document.getElementById('status-indicator');
        status.style.display = 'block';
        
        try {
            // 讀取你提供的 districts.geojson 路徑
            const response = await fetch('https://ku1311.github.io/ZpeederHK/assets/districts.geojson');
            if (!response.ok) throw new Error('GeoJSON fetch failed');
            const geojsonData = await response.json();
            
            // 建立隱形圖層用於 PIP 計算
            districtBoundaryLayer = L.geoJSON(geojsonData);
            console.log("✅ 18區邊界加載完成");
            
            initUserLocation();
        } catch (err) {
            console.error("❌ 邊界數據出錯:", err);
            status.innerHTML = "⚠️ 邊界數據讀取失敗，改用預設加載";
            executeLoad(); 
        }
    }

    function initUserLocation() {
        const status = document.getElementById('status-indicator');
        status.innerHTML = "📍 正在獲取您的精確位置...";
        
        map.locate({setView: false});

        map.on('locationfound', (e) => {
            map.setView(e.latlng, 18);
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker(e.latlng, { 
                radius: 8, fillColor: "#007bff", color: "#fff", weight: 3, fillOpacity: 1 
            }).addTo(map).bindPopup("您的位置").openPopup();
            
            executeLoad();
        });

        map.on('locationerror', () => {
            console.warn("定位失敗");
            status.innerHTML = "⚠️ 定位失敗，加載預設區域";
            executeLoad();
        });
    }

    // --- 精確分區加載邏輯 ---
    async function executeLoad() {
        const day = document.getElementById('dayType').value;
        const hour = document.getElementById('singleHour').value;
        const status = document.getElementById('status-indicator');
        const currentPos = map.getCenter();

        // 清除現有圖層
        activeLayers.forEach(l => map.removeLayer(l));
        activeLayers = [];

        let myDistrictID = "Yau_Tsim_Mong_District"; // 預設
        let myDistrictName = "油尖旺區";

        // 🛠️ PIP 空間判斷：找出用戶在那一區的多邊形內
        if (districtBoundaryLayer) {
            const results = leafletPip.pointInLayer(currentPos, districtBoundaryLayer);
            if (results.length > 0) {
                const props = results[0].feature.properties;
                // 根據你 SHP 的欄位 NAME_EN 和 NAME_TC
                myDistrictID = (props.NAME_EN || "Yau Tsim Mong").replace(/\s+/g, '_') + "_District";
                myDistrictName = props.NAME_TC || "當前區域";
                console.log("🎯 成功定位區域:", myDistrictID);
            }
        }

        status.style.display = 'block';
        status.innerHTML = `📍 您目前在：<b>${myDistrictName}</b><br>🚀 正在優先加載本區數據...`;

        // 第一階段：立即加載用戶所在區
        await loadBatch([myDistrictID], day, hour);

        // 第二階段：背景補全其他 17 個區
        const remaining = allDistrictIDs.filter(id => id !== myDistrictID);
        setTimeout(async () => {
            status.innerHTML = `📍 您目前在：<b>${myDistrictName}</b><br>🌐 背景補全全港數據...`;
            await loadBatch(remaining, day, hour);
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }, 800);
    }

    async function loadBatch(ids, day, hour) {
        const tasks = ids.map(id => {
            const url = `https://ku1311.github.io/ZpeederHK/dayhour_score_output/${id}/Intensity_${day}_${hour}h.gpkg?v=${Date.now()}`;
            
            return new Promise((resolve) => {
                const layer = L.geoPackageFeatureLayer([], {
                    geoPackageUrl: url,
                    layerName: 'intensity',
                    style: (f) => ({
                        weight: 6, opacity: 0.85, 
                        color: getColor(f.properties.Intensity_Score),
                        lineCap: 'round'
                    }),
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        l.bindPopup(`
                            <div class="popup-box">
                                <div style="font-weight:bold; border-bottom:1px solid #ddd; margin-bottom:5px; padding-bottom:5px;">${p.CHINESESTR}</div>
                                <div style="color:#e74c3c; font-size:18px; font-weight:bold;">風險: ${p.Intensity_Score}%</div>
                                <div class="history-box">🕒 近期紀錄：<br>${p.Recent_Logs || '無紀錄'}</div>
                            </div>
                        `);
                    }
                }).addTo(map);

                layer.on('dataloaded', () => {
                    console.log(`✅ Loaded: ${id}`);
                    resolve();
                });

                // 防卡死機制
                setTimeout(resolve, 4000);
                activeLayers.push(layer);
            });
        });

        await Promise.all(tasks);
    }

    // 啟動入口
    window.onload = initSystem;
</script>
</body>
</html>

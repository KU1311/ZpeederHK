<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZpeederHK - 違停風險動態地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; }
        #status-indicator {
            position: absolute; top: 20px; left: 20px; z-index: 2000;
            background: rgba(0,0,0,0.85); color: #00ff00; padding: 12px 20px;
            border-radius: 4px; font-family: monospace; font-size: 13px; display: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px; width: 280px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }
        .mode-switch { display: flex; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .mode-switch button { flex: 1; border: none; padding: 8px; cursor: pointer; background: #eee; font-weight: bold; }
        .mode-switch button.active { background: #2c3e50; color: white; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        select, input[type="range"] { width: 100%; margin-top: 5px; padding: 5px; }
        .range-display { text-align: center; font-weight: bold; font-size: 14px; margin: 5px 0; color: #e74c3c; }
        button#update-btn {
            width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; 
            cursor: pointer; font-weight: bold; font-size: 15px;
        }
        .popup-box { min-width: 250px; }
        .history-box { background: #f8f9fa; border-left: 5px solid #2c3e50; padding: 8px; font-size: 11px; margin-top: 10px; }
        .legend { line-height: 18px; background: white; padding: 10px; border-radius: 5px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="status-indicator">⏳ 初始化地圖中...</div>

<div class="control-panel">
    <h3 style="margin:0 0 15px 0; text-align: center;">🚗 違停風險查詢</h3>
    <div class="mode-switch">
        <button id="btn-single" class="active" onclick="setMode('single')">單一時點</button>
        <button id="btn-range" onclick="setMode('range')">長時間停泊</button>
    </div>
    <div class="input-group">
        <label>日子類型：</label>
        <select id="dayType">
            <option value="Weekday">平日 (Weekday)</option>
            <option value="Sat">週六 (Sat)</option>
            <option value="Sun">週日 (Sun)</option>
        </select>
    </div>
    <div id="ui-single">
        <input type="range" id="singleHour" min="0" max="23" value="15" oninput="updateRangeText()">
        <div class="range-display"><span id="singleHourVal">15</span>:00</div>
    </div>
    <div id="ui-range" style="display:none">
        <label>開始時間：</label><input type="range" id="startHour" min="0" max="23" value="9" oninput="updateRangeText()">
        <label>結束時間：</label><input type="range" id="endHour" min="0" max="23" value="17" oninput="updateRangeText()">
        <div class="range-display">時段：<span id="rangeText">09:00 - 17:00</span></div>
    </div>
    <button id="update-btn" onclick="executeLoad()">立即更新地圖</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@ngageoint/leaflet-geopackage@2.0.5/dist/leaflet-geopackage.min.js"></script>

<script>
    const map = L.map('map').setView([22.3193, 114.1694], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    let currentMode = 'single';
    let geoLayer = null;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-single').className = (mode === 'single' ? 'active' : '');
        document.getElementById('btn-range').className = (mode === 'range' ? 'active' : '');
        document.getElementById('ui-single').style.display = (mode === 'single' ? 'block' : 'none');
        document.getElementById('ui-range').style.display = (mode === 'range' ? 'block' : 'none');
        updateRangeText();
    }

    function updateRangeText() {
        if (currentMode === 'single') {
            document.getElementById('singleHourVal').innerText = document.getElementById('singleHour').value.padStart(2, '0');
        } else {
            let s = parseInt(document.getElementById('startHour').value);
            let e = parseInt(document.getElementById('endHour').value);
            if (e < s) e = s;
            document.getElementById('rangeText').innerText = `${s.toString().padStart(2,'0')}:00 - ${e.toString().padStart(2,'0')}:00`;
        }
    }

    function getColor(d) {
        return d >= 90 ? '#800026' : d >= 70 ? '#BD0026' : d >= 50 ? '#E31A1C' : 
               d >= 30 ? '#FC4E2A' : d >= 10 ? '#FEB24C' : '#FFEDA0';
    }

    async function executeLoad() {
        const day = document.getElementById('dayType').value;
        const status = document.getElementById('status-indicator');
        status.style.display = 'block';

        if (geoLayer) map.removeLayer(geoLayer);

        let hours = [];
        if (currentMode === 'single') {
            hours.push(document.getElementById('singleHour').value);
        } else {
            let s = parseInt(document.getElementById('startHour').value);
            let e = parseInt(document.getElementById('endHour').value);
            if (e < s) [s, e] = [e, s];
            for (let i = s; i <= e; i++) hours.push(i);
        }

        let roadDataMap = new Map();

        // 逐一處理每個時段
        for (let h of hours) {
            status.innerText = `⏳ 加載中: ${h}:00...`;
            const url = `https://ku1311.github.io/ZpeederHK/dayhour_score_output/Intensity_${day}_${h}h.gpkg?v=${Date.now()}`;
            
            await new Promise((resolve) => {
                // 利用一個隱形圖層來讀取數據
                const tempLayer = L.geoPackageFeatureLayer([], {
                    geoPackageUrl: url,
                    layerName: 'intensity',
                    onEachFeature: (f) => {
                        const id = f.properties.OBJECTID;
                        const p = (f.properties.Intensity_Score || 0) / 100;
                        if (!roadDataMap.has(id)) {
                            roadDataMap.set(id, {
                                geom: f.geometry,
                                name: f.properties.CHINESESTR,
                                invProb: (1 - p),
                                logs: f.properties.Recent_Logs || ""
                            });
                        } else {
                            let item = roadDataMap.get(id);
                            item.invProb *= (1 - p);
                            // 避免重複 log
                            if (f.properties.Recent_Logs && !item.logs.includes(f.properties.Recent_Logs.substring(0,10))) {
                                item.logs = f.properties.Recent_Logs + "<br>" + item.logs;
                            }
                        }
                    }
                });

                // 監聽 dataloaded 事件
                tempLayer.on('dataloaded', () => {
                    resolve();
                });

                // 安全機制：超時自動跳過（例如檔案不存在時）
                setTimeout(resolve, 2500);
            });
        }

        // 轉換為 GeoJSON 圖層
        const finalFeatures = Array.from(roadDataMap.values()).map(data => {
            const finalScore = Math.round((1 - data.invProb) * 1000) / 10;
            return {
                type: "Feature",
                geometry: data.geom,
                properties: {
                    CHINESESTR: data.name,
                    Intensity_Score: finalScore,
                    Recent_Logs: data.logs.split('<br>').slice(0, 3).join('<br>')
                }
            };
        });

        if (finalFeatures.length === 0) {
            status.innerText = "❌ 無法讀取數據 (請確認 GPKG 路徑)";
            setTimeout(() => status.style.display = 'none', 3000);
            return;
        }

        geoLayer = L.geoJSON({ type: "FeatureCollection", features: finalFeatures }, {
            style: (f) => ({
                weight: 6, opacity: 0.85, color: getColor(f.properties.Intensity_Score), lineCap: 'round'
            }),
            onEachFeature: (f, layer) => {
                layer.bindPopup(`
                    <div class="popup-box">
                        <div class="popup-title">${f.properties.CHINESESTR}</div>
                        <div class="prob-text">總計風險: ${f.properties.Intensity_Score}%</div>
                        <div class="history-box">
                            <strong>🕒 近期紀錄：</strong><br>${f.properties.Recent_Logs || '無'}
                        </div>
                    </div>
                `);
            }
        }).addTo(map);

        status.innerText = "✅ 數據加載成功";
        setTimeout(() => status.style.display = 'none', 1000);
    }

    const legend = L.control({position: 'bottomleft'});
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend'), grades = [0, 10, 30, 50, 70, 90];
        div.innerHTML = '<b>風險程度</b><br>';
        for (let i = 0; i < grades.length; i++) div.innerHTML += `<i style="background:${getColor(grades[i] + 1)}"></i> ${grades[i]}%${grades[i+1] ? '&ndash;'+grades[i+1]+'%' : '+'}<br>`;
        return div;
    };
    legend.addTo(map);
    window.onload = () => { updateRangeText(); executeLoad(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZpeederHK - 違停機率動態地圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: #f4f4f7; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* 控制面板 */
        .control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 280px;
        }
        h3 { margin-top: 0; color: #333; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #666; font-size: 13px; }
        select, input[type="range"] { width: 100%; margin: 10px 0; }
        
        .btn-update {
            margin-top: 20px; width: 100%; cursor: pointer; background: #2c3e50; 
            color: white; border: none; padding: 12px; border-radius: 6px; 
            font-size: 15px; font-weight: bold; transition: background 0.3s;
        }
        .btn-update:hover { background: #34495e; }

        /* 進度條樣式 */
        #progress-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 320px; background: rgba(0,0,0,0.8); border-radius: 25px;
            padding: 12px 20px; z-index: 2000; display: none;
        }
        #progress-bar-bg { width: 100%; background: #444; height: 8px; border-radius: 4px; overflow: hidden; }
        #progress-bar-fill { height: 100%; width: 0%; background: #00ff00; transition: width 0.2s; }
        #progress-text { color: white; text-align: center; font-size: 12px; margin-top: 8px; font-family: monospace; }
        
        /* Popup 表格 */
        .popup-container { min-width: 200px; }
        .popup-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        .popup-score { font-size: 20px; color: #e74c3c; font-weight: bold; margin-bottom: 10px; }
        .popup-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .popup-table th, .popup-table td { text-align: left; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 12px; }
        .popup-table th { color: #888; font-weight: normal; }
        
        /* 圖例 */
        .legend {
            background: white; padding: 10px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1); line-height: 18px; color: #555;
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 2px; }
    </style>
</head>
<body>

<div id="progress-container">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-text">準備下載...</div>
</div>

<div class="control-panel">
    <h3>🚗 違停機率查詢</h3>
    
    <label>日子類型</label>
    <select id="dayType">
        <option value="Weekday">平日 (Weekday)</option>
        <option value="Sat">星期六 (Sat)</option>
        <option value="Sun">星期日 (Sun)</option>
    </select>

    <label>查詢時段</label>
    <input type="range" id="hourSlider" min="0" max="23" value="15" oninput="hourVal.innerText = this.value.padStart(2, '0')">
    <div style="text-align: center; font-size: 18px; font-weight: bold;"><span id="hourVal">15</span>:00</div>
    <div style="text-align: center; font-size: 11px; color: #999;">(計算結果包含前後 1 小時數據)</div>

    <button class="btn-update" onclick="loadData()">更新地圖數據</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@ngageoint/leaflet-geopackage@2.0.5/dist/leaflet-geopackage.min.js"></script>

<script>
    // 1. 初始化地圖
    const map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 13);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 使用 CartoDB 簡潔底圖
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    let currentLayer = null;

    // 2. 機率顏色映射 (0% - 100%)
    function getColor(p) {
        return p >= 80 ? '#800026' :
               p >= 60 ? '#BD0026' :
               p >= 40 ? '#E31A1C' :
               p >= 20 ? '#FC4E2A' :
               p >= 5  ? '#FD8D3C' :
               p > 0   ? '#FEB24C' :
                         '#FFEDA0';
    }

    function style(feature) {
        return {
            weight: 5,
            opacity: 0.85,
            color: getColor(feature.properties.Intensity_Score),
            lineCap: 'round'
        };
    }

    // 3. 核心加載函數 (帶有進度條)
    async function loadData() {
        const day = document.getElementById('dayType').value;
        const hour = document.getElementById('hourSlider').value;
        const url = `https://ku1311.github.io/ZpeederHK/dayhour_score_output/Intensity_${day}_${hour}h.gpkg`;

        const container = document.getElementById('progress-container');
        const bar = document.getElementById('progress-bar-fill');
        const text = document.getElementById('progress-text');

        if (currentLayer) map.removeLayer(currentLayer);
        container.style.display = 'block';
        bar.style.width = '0%';
        text.innerText = "正在連線...";

        try {
            // 1. 使用 Fetch 獲取回應
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);

            // 2. 監控下載進度
            const reader = response.body.getReader();
            const contentLength = +response.headers.get('Content-Length');
            
            let receivedLength = 0;
            let chunks = []; 
            
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                
                if (contentLength) {
                    const percent = Math.round((receivedLength / contentLength) * 100);
                    bar.style.width = percent + '%';
                    text.innerText = `下載中: ${percent}% (${(receivedLength/1024/1024).toFixed(1)}MB)`;
                }
            }

            // 3. 🟢 將 Chunks 合併為一個完整的 Uint8Array (這是解決 "not a database" 的關鍵)
            let chunksAll = new Uint8Array(receivedLength);
            let position = 0;
            for(let chunk of chunks) {
                chunksAll.set(chunk, position);
                position += chunk.length;
            }

            text.innerText = "正在解析地理資料庫...";

            // 4. 交給 GeoPackage 插件渲染
            currentLayer = L.geoPackageFeatureLayer([], {
                geoPackageBinary: chunksAll, // 確保傳入的是完整的 Uint8Array
                layerName: 'intensity',
                style: style,
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    const content = `
                        <div class="popup-container">
                            <div class="popup-title">${p.CHINESESTR || '未知路段'}</div>
                            <div class="popup-score">出現機率: ${p.Intensity_Score}%</div>
                            <table class="popup-table">
                                <tr><th>來源拆解</th><th>機率貢獻</th></tr>
                                <tr><td>📍 精確點位</td><td>${p.P_Exact}%</td></tr>
                                <tr><td>🕸️ 網絡擴散</td><td>${p.P_Network}%</td></tr>
                                <tr><td>🛣️ 全街平均</td><td>${p.P_Street}%</td></tr>
                            </table>
                        </div>
                    `;
                    layer.bindPopup(content);
                }
            }).addTo(map);

        } catch (err) {
            console.error("載入失敗詳細資訊:", err);
            alert("載入失敗: " + err.message);
        } finally {
            setTimeout(() => { container.style.display = 'none'; }, 800);
        }
    }

    // 5. 圖例控制
    const legend = L.control({ position: 'bottomleft' });
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        const grades = [0, 5, 20, 40, 60, 80];
        const labels = ['<strong>發生機率</strong>'];

        for (let i = 0; i < grades.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '%<br>' : '%+');
        }
        return div;
    };
    legend.addTo(map);

    // 初始載入
    window.onload = loadData;

</script>

</body>
</html>
